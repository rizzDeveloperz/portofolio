<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Flappy Bird</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: #000;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  #game-wrap {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    touch-action: none;
    overscroll-behavior: none;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: calc(100vh * 9 / 16);
    max-width: calc(100dvh * 9 / 16);
    max-height: calc(100vw * 16 / 9);
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    background: #4ec0ca;
  }

  #game {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(20, 30, 40, 0.45);
    color: #fff;
    padding: 24px;
    z-index: 10;
  }

  .title {
    margin: 0 0 6px 0;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
  }

  .subtitle {
    margin: 4px 0 18px 0;
    font-size: 16px;
    opacity: 0.9;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  .best-line, .score-line {
    margin: 3px 0;
    font-size: 16px;
    font-weight: 600;
    opacity: 0.95;
  }

  .score-line span, .best-line span {
    font-weight: 800;
    color: #ffd23f;
  }

  .badge {
    margin: 4px 0 8px 0;
    padding: 5px 14px;
    background: #ff8c00;
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    border-radius: 20px;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .btn {
    margin-top: 22px;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 800;
    font-family: inherit;
    border: none;
    border-radius: 30px;
    background: linear-gradient(180deg, #ffd23f, #ff8c00);
    color: #4a2e00;
    box-shadow: 0 4px 0 #b35f00, 0 6px 14px rgba(0,0,0,0.35);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }

  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #b35f00, 0 3px 8px rgba(0,0,0,0.35);
  }

  #gameover-screen { display: none; }
</style>
</head>
<body>

<div id="game-wrap">
  <div id="game-container">
    <canvas id="game"></canvas>

    <div id="start-screen" class="overlay">
      <h1 class="title">Flappy Bird</h1>
      <p class="subtitle">Tap layar untuk mulai</p>
      <p class="best-line">Best: <span id="start-best">0</span></p>
    </div>

    <div id="gameover-screen" class="overlay">
      <h1 class="title">Game Over</h1>
      <div id="new-best-badge" class="badge">New Best!</div>
      <p class="score-line">Skor: <span id="final-score">0</span></p>
      <p class="best-line">Best: <span id="final-best">0</span></p>
      <button id="retry-btn" class="btn" type="button">Coba Lagi</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Constants ----------
  var LOGICAL_W = 360;
  var LOGICAL_H = 640;
  var GROUND_H = 80;

  var GRAVITY = 0.45;
  var JUMP_VELOCITY = -7.6;
  var MAX_FALL_SPEED = 10;

  var PIPE_WIDTH = 56;
  var PIPE_GAP = 165;
  var PIPE_SPEED = 2.3;
  var PIPE_SPAWN_DIST = 210;
  var PIPE_MIN_TOP = 60;
  var PIPE_MIN_BOTTOM = 60;

  var BIRD_X = LOGICAL_W * 0.28;
  var BIRD_RADIUS = 14;

  var HIGH_SCORE_KEY = "flappyBirdHighScore";

  // ---------- DOM ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var wrap = document.getElementById("game-wrap");
  var startScreen = document.getElementById("start-screen");
  var gameoverScreen = document.getElementById("gameover-screen");
  var startBestEl = document.getElementById("start-best");
  var finalScoreEl = document.getElementById("final-score");
  var finalBestEl = document.getElementById("final-best");
  var newBestBadge = document.getElementById("new-best-badge");
  var retryBtn = document.getElementById("retry-btn");

  // ---------- Game state ----------
  var state = "ready"; // "ready" | "playing" | "gameover"
  var bird = { y: LOGICAL_H / 2, velocity: 0, rotation: 0 };
  var pipes = [];
  var score = 0;
  var highScore = 0;
  var spawnAcc = 0;
  var groundOffset = 0;

  // ---------- Storage ----------
  function loadHighScore() {
    try {
      var v = localStorage.getItem(HIGH_SCORE_KEY);
      var n = parseInt(v, 10);
      return isNaN(n) ? 0 : n;
    } catch (e) {
      return 0;
    }
  }

  function saveHighScore(v) {
    try {
      localStorage.setItem(HIGH_SCORE_KEY, String(v));
    } catch (e) {
      // localStorage unavailable (e.g. private mode) - ignore silently
    }
  }

  function updateBestDisplays() {
    startBestEl.textContent = highScore;
    finalBestEl.textContent = highScore;
  }

  // ---------- Canvas sizing ----------
  function resizeCanvas() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(LOGICAL_W * dpr);
    canvas.height = Math.round(LOGICAL_H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ---------- Collision ----------
  function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
    if (rw <= 0 || rh <= 0) return false;
    var closestX = Math.max(rx, Math.min(cx, rx + rw));
    var closestY = Math.max(ry, Math.min(cy, ry + rh));
    var dx = cx - closestX;
    var dy = cy - closestY;
    return (dx * dx + dy * dy) < (r * r);
  }

  // ---------- Game logic ----------
  function resetGame() {
    bird.y = LOGICAL_H / 2;
    bird.velocity = 0;
    bird.rotation = 0;
    pipes = [];
    score = 0;
    spawnAcc = PIPE_SPAWN_DIST - 60;
    groundOffset = 0;
  }

  function refreshOverlays() {
    startScreen.style.display = (state === "ready") ? "flex" : "none";
    gameoverScreen.style.display = (state === "gameover") ? "flex" : "none";
  }

  function flap() {
    bird.velocity = JUMP_VELOCITY;
  }

  function spawnPipe() {
    var maxTop = LOGICAL_H - GROUND_H - PIPE_GAP - PIPE_MIN_BOTTOM;
    if (maxTop < PIPE_MIN_TOP) maxTop = PIPE_MIN_TOP;
    var topHeight = Math.random() * (maxTop - PIPE_MIN_TOP) + PIPE_MIN_TOP;
    pipes.push({ x: LOGICAL_W, top: topHeight, passed: false });
  }

  function gameOver() {
    if (state === "gameover") return;
    state = "gameover";

    var isNewBest = score > highScore;
    if (isNewBest) {
      highScore = score;
      saveHighScore(highScore);
    }
    newBestBadge.style.display = isNewBest ? "inline-block" : "none";

    finalScoreEl.textContent = score;
    updateBestDisplays();
    refreshOverlays();
  }

  function handleInput(e) {
    if (e) e.preventDefault();
    if (state === "ready") {
      state = "playing";
      refreshOverlays();
      flap();
    } else if (state === "playing") {
      flap();
    }
    // "gameover" state: ignored here, handled by the Try Again button
  }

  // ---------- Update ----------
  function update(dt) {
    if (state === "gameover") {
      return; // fully frozen on death
    }

    groundOffset = (groundOffset + PIPE_SPEED * dt) % 40;

    if (state === "ready") {
      bird.velocity = 0;
      return;
    }

    // Bird physics
    bird.velocity += GRAVITY * dt;
    if (bird.velocity > MAX_FALL_SPEED) bird.velocity = MAX_FALL_SPEED;
    bird.y += bird.velocity * dt;
    bird.rotation = Math.max(-25, Math.min(90, bird.velocity * 4));

    if (bird.y - BIRD_RADIUS < 0) {
      bird.y = BIRD_RADIUS;
      bird.velocity = 0;
    }

    // Move pipes
    var i;
    for (i = 0; i < pipes.length; i++) {
      pipes[i].x -= PIPE_SPEED * dt;
    }
    while (pipes.length && pipes[0].x + PIPE_WIDTH < 0) {
      pipes.shift();
    }

    // Spawn pipes based on distance traveled (frame-rate independent)
    spawnAcc += PIPE_SPEED * dt;
    if (spawnAcc >= PIPE_SPAWN_DIST) {
      spawnAcc -= PIPE_SPAWN_DIST;
      spawnPipe();
    }

    // Scoring + collision
    for (i = 0; i < pipes.length; i++) {
      var p = pipes[i];

      if (!p.passed && (p.x + PIPE_WIDTH) < (BIRD_X - BIRD_RADIUS)) {
        p.passed = true;
        score++;
      }

      var bottomY = p.top + PIPE_GAP;
      var bottomH = LOGICAL_H - GROUND_H - bottomY;

      if (
        circleRectCollide(BIRD_X, bird.y, BIRD_RADIUS, p.x, 0, PIPE_WIDTH, p.top) ||
        circleRectCollide(BIRD_X, bird.y, BIRD_RADIUS, p.x, bottomY, PIPE_WIDTH, bottomH)
      ) {
        gameOver();
        return;
      }
    }

    // Ground collision
    if (bird.y + BIRD_RADIUS >= LOGICAL_H - GROUND_H) {
      bird.y = LOGICAL_H - GROUND_H - BIRD_RADIUS;
      gameOver();
      return;
    }
  }

  // ---------- Render ----------
  function drawCloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r * 0.8, y + 6, r * 0.7, 0, Math.PI * 2);
    ctx.arc(x - r * 0.8, y + 6, r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBackground() {
    var g = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
    g.addColorStop(0, "#4ec0ca");
    g.addColorStop(1, "#9be3d4");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

    ctx.fillStyle = "rgba(255,255,255,0.8)";
    drawCloud(60, 100, 26);
    drawCloud(250, 70, 20);
    drawCloud(160, 160, 16);
  }

  function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      var bottomY = p.top + PIPE_GAP;
      var bottomH = LOGICAL_H - GROUND_H - bottomY;

      // Top pipe body
      ctx.fillStyle = "#4caf50";
      ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
      ctx.fillStyle = "#3d8b40";
      ctx.fillRect(p.x + 4, 0, 6, p.top);
      // Top pipe lip
      ctx.fillStyle = "#5cbf60";
      ctx.fillRect(p.x - 4, Math.max(0, p.top - 24), PIPE_WIDTH + 8, 24);
      ctx.fillStyle = "#3d8b40";
      ctx.fillRect(p.x - 4, Math.max(0, p.top - 24), PIPE_WIDTH + 8, 5);

      // Bottom pipe body
      ctx.fillStyle = "#4caf50";
      ctx.fillRect(p.x, bottomY, PIPE_WIDTH, bottomH);
      ctx.fillStyle = "#3d8b40";
      ctx.fillRect(p.x + 4, bottomY, 6, bottomH);
      // Bottom pipe lip
      ctx.fillStyle = "#5cbf60";
      ctx.fillRect(p.x - 4, bottomY, PIPE_WIDTH + 8, 24);
      ctx.fillStyle = "#3d8b40";
      ctx.fillRect(p.x - 4, bottomY + 19, PIPE_WIDTH + 8, 5);
    }
  }

  function drawGround() {
    var y = LOGICAL_H - GROUND_H;
    ctx.fillStyle = "#ded17e";
    ctx.fillRect(0, y, LOGICAL_W, GROUND_H);

    ctx.fillStyle = "#6b8e23";
    ctx.fillRect(0, y, LOGICAL_W, 6);

    ctx.fillStyle = "#c9b968";
    var startX = -40 + (-(groundOffset % 40));
    for (var x = startX; x < LOGICAL_W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x + 6, y + 6);
      ctx.lineTo(x + 26, y + 6);
      ctx.lineTo(x + 16, y + 18);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawBird() {
    ctx.save();

    var renderY = bird.y;
    if (state === "ready") {
      renderY += Math.sin(performance.now() * 0.004) * 8;
    }

    ctx.translate(BIRD_X, renderY);
    ctx.rotate(bird.rotation * Math.PI / 180);

    // Wing
    var wingFlap = Math.sin(performance.now() * 0.015) * 14;
    ctx.save();
    ctx.rotate(wingFlap * Math.PI / 180);
    ctx.fillStyle = "#f0a500";
    ctx.beginPath();
    ctx.ellipse(-3, 5, 9, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Body
    ctx.fillStyle = "#ffd23f";
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#e0a500";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Beak
    ctx.fillStyle = "#ff8c00";
    ctx.beginPath();
    ctx.moveTo(BIRD_RADIUS - 2, -3);
    ctx.lineTo(BIRD_RADIUS + 9, 0);
    ctx.lineTo(BIRD_RADIUS - 2, 4);
    ctx.closePath();
    ctx.fill();

    // Eye
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(4, -5, 4.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(5.5, -5, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawScore() {
    ctx.save();
    ctx.font = "bold 46px Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 5;
    ctx.strokeText(String(score), LOGICAL_W / 2, 100);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(String(score), LOGICAL_W / 2, 100);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
    drawBackground();
    drawPipes();
    drawGround();
    drawBird();
    if (state !== "ready") drawScore();
  }

  // ---------- Main loop (single persistent loop, never restarted) ----------
  var lastTime = 0;

  function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var dt = (timestamp - lastTime) / (1000 / 60);
    if (!isFinite(dt) || dt < 0) dt = 1;
    if (dt > 2.5) dt = 1; // guard against huge jumps (e.g. tab was backgrounded)
    lastTime = timestamp;

    update(dt);
    render();

    requestAnimationFrame(loop);
  }

  // ---------- Input ----------
  wrap.addEventListener("pointerdown", handleInput, { passive: false });
  wrap.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  document.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });

  document.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "Enter") {
      if (state === "gameover") return; // let the focused Try Again button handle activation itself
      handleInput(e);
    }
  });

  retryBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    resetGame();
    state = "playing";
    refreshOverlays();
  });
  retryBtn.addEventListener("pointerdown", function (e) {
    e.stopPropagation();
  });

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("orientationchange", resizeCanvas);

  // ---------- Init ----------
  highScore = loadHighScore();
  updateBestDisplays();
  resizeCanvas();
  resetGame();
  state = "ready";
  refreshOverlays();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
